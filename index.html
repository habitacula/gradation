<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>수채화 프롬프트 빌더</title>
  <style>
    :root{
      --bg:#f5f4f1; --panel:#ffffff; --text:#111827; --muted:#6b7280; --line:#e5e7eb; --accent:#0f172a;
      --ok:#065f46; --okbg:#ecfdf5; --warn:#92400e; --warnbg:#fffbeb; --err:#991b1b; --errbg:#fef2f2;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;
      line-height:1.55;
    }
    .wrap{max-width:920px; margin:0 auto; padding:20px 16px 36px}
    h1{font-size:30px; line-height:1.18; margin:0 0 8px; letter-spacing:-0.02em}
    .lead{margin:0 0 16px; color:var(--muted); font-size:17px}
    .panel{
      background:var(--panel); border:1px solid var(--line); border-radius:20px;
      padding:16px; box-shadow:0 8px 24px rgba(15,23,42,.04); margin-bottom:16px;
    }
    .title{font-size:18px; font-weight:800; margin:0 0 12px}
    .field{margin-bottom:12px}
    label{display:block; font-size:14px; font-weight:700; margin-bottom:6px}
    input[type="file"], select, textarea, button{
      font:inherit;
    }
    input[type="file"], select, textarea{
      width:100%; border:1px solid var(--line); border-radius:14px; background:#fff; color:var(--text);
      padding:12px 14px;
    }
    select{appearance:auto; min-height:48px}
    textarea{min-height:280px; resize:vertical}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    button{
      width:100%; border:0; border-radius:16px; padding:15px 16px; background:var(--accent); color:#fff;
      font-weight:800; margin-top:6px; cursor:pointer;
    }
    button:disabled{opacity:.65; cursor:default}
    .ghost{background:#fff; color:var(--text); border:1px solid var(--line)}
    .status{
      padding:11px 13px; border-radius:14px; border:1px solid var(--line); font-size:14px; margin-top:10px;
      background:#fff;
    }
    .ok{color:var(--ok); background:var(--okbg); border-color:#a7f3d0}
    .warn{color:var(--warn); background:var(--warnbg); border-color:#fcd34d}
    .err{color:var(--err); background:var(--errbg); border-color:#fca5a5}
    .preview{
      border:1px dashed var(--line); border-radius:16px; min-height:220px; background:#fafafa;
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .preview img{
      width:100%; height:auto; display:block;
    }
    .muted{color:var(--muted); font-size:13px}
    .swatches{
      display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    }
    .swatch{
      border:1px solid var(--line); border-radius:14px; overflow:hidden; background:#fff;
    }
    .color{height:64px}
    .meta{padding:10px; font-size:12px}
    .meta strong{display:block; font-size:13px; margin-bottom:3px}
    .head{
      display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;
    }
    .copybtn{
      width:auto; margin:0; padding:9px 12px; border-radius:12px; font-size:13px; background:#fff; color:var(--text); border:1px solid var(--line);
    }
    .hint-box{
      border:1px solid var(--line); border-radius:14px; padding:12px; background:#fafafa; font-size:13px; color:#374151; margin-top:10px;
    }
    .pill{
      display:inline-block; font-size:12px; background:#f3f4f6; border:1px solid var(--line);
      padding:4px 8px; border-radius:999px; margin-right:6px; margin-bottom:6px;
    }
    @media (max-width:640px){
      .row{grid-template-columns:1fr 1fr}
      .swatches{grid-template-columns:repeat(2,1fr)}
      h1{font-size:28px}
      textarea{min-height:320px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>수채화 프롬프트 빌더</h1>
    <p class="lead">사진의 핵심 색상을 뽑아 인스타 배경용 수채화 프롬프트로 바꾸고, 번짐 효과도 매번 다르게 변주한다.</p>

    <div class="panel">
      <div class="title">입력</div>

      <div class="field">
        <label for="imageInput">이미지 업로드</label>
        <input id="imageInput" type="file" accept="image/*">
      </div>

      <div class="row">
        <div class="field">
          <label for="paletteCount">추출 색상 수</label>
          <select id="paletteCount">
            <option value="2">2색</option>
            <option value="3" selected>3색</option>
            <option value="4">4색</option>
            <option value="5">5색</option>
          </select>
        </div>
        <div class="field">
          <label for="layoutMode">배경 구도</label>
          <select id="layoutMode">
            <option value="중앙 여백형" selected>중앙 여백형</option>
            <option value="가장자리 확산형">가장자리 확산형</option>
            <option value="대각선 흐름형">대각선 흐름형</option>
            <option value="전면 워시형">전면 워시형</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="intensityMode">분위기 강도</label>
          <select id="intensityMode">
            <option value="연하고 공기감 있게" selected>연하고 공기감 있게</option>
            <option value="균형감 있게">균형감 있게</option>
            <option value="대비감 있게">대비감 있게</option>
          </select>
        </div>
        <div class="field">
          <label for="aspectMode">화면 비율</label>
          <select id="aspectMode">
            <option value="9:16 스토리형">9:16 스토리형</option>
            <option value="4:5 피드형" selected>4:5 피드형</option>
            <option value="1:1 정사각형">1:1 정사각형</option>
            <option value="16:9 와이드형">16:9 와이드형</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="bleedMode">번짐 스타일</label>
          <select id="bleedMode">
            <option value="자동 랜덤" selected>자동 랜덤</option>
            <option value="안개형 워시">안개형 워시</option>
            <option value="블룸 강조">블룸 강조</option>
            <option value="역번짐 강조">역번짐 강조</option>
            <option value="가장자리 풀링">가장자리 풀링</option>
            <option value="다층 워시">다층 워시</option>
            <option value="입자 확산">입자 확산</option>
            <option value="비대칭 대형 번짐">비대칭 대형 번짐</option>
          </select>
        </div>
        <div class="field">
          <label for="variationMode">변주 강도</label>
          <select id="variationMode">
            <option value="안정적">안정적</option>
            <option value="중간" selected>중간</option>
            <option value="강함">강함</option>
          </select>
        </div>
      </div>

      <button id="runBtn" type="button">색상 추출하고 프롬프트 만들기</button>
      <button id="rerollBtn" type="button" class="ghost">같은 팔레트로 다시 변주하기</button>
      <button id="demoBtn" type="button" class="ghost">샘플 데이터로 테스트</button>
      <div id="status" class="status warn">준비됨. 먼저 샘플 데이터로 테스트를 눌러보면 된다.</div>
      <div class="hint-box">
        <div><span class="pill">JSON 삭제</span><span class="pill">번짐 옵션 추가</span><span class="pill">같은 팔레트 재변주</span></div>
        같은 사진이라도 번짐 스타일과 문장 구성을 다시 섞어서 더 덜 정형화된 프롬프트를 만들 수 있게 바꿨다.
      </div>
    </div>

    <div class="panel">
      <div class="title">미리보기</div>
      <div class="preview" id="previewBox">
        <div id="previewPlaceholder" class="muted">업로드한 이미지가 여기 표시된다.</div>
        <img id="previewImg" style="display:none;" alt="preview">
      </div>
    </div>

    <div class="panel">
      <div class="title">추출 팔레트</div>
      <div id="swatches" class="swatches"></div>
    </div>

    <div class="panel">
      <div class="head">
        <div class="title" style="margin:0;">생성 프롬프트</div>
        <button id="copyPromptBtn" class="copybtn" type="button">복사</button>
      </div>
      <textarea id="promptOutput" placeholder="여기에 프롬프트가 생성된다."></textarea>
    </div>

    <div class="panel">
      <div class="head">
        <div class="title" style="margin:0;">네거티브 프롬프트</div>
        <button id="copyNegativeBtn" class="copybtn" type="button">복사</button>
      </div>
      <textarea id="negativeOutput"></textarea>
    </div>
  </div>

<script>
(function(){
  const NEG = '인물, 동물, 꽃, 풍경, 건물, 제품 사진 느낌, 문자, 로고, 타이포그래피, 아이콘, 프레임, 선명한 외곽선, 기하학 패턴, 벡터 그래픽, 만화풍, 포토리얼 오브젝트, 아크릴 광택, 유화의 두꺼운 질감, 금박, 플라스틱 표면, 과도한 디지털 노이즈, 과장된 3D 렌더링';

  const imageInput = document.getElementById('imageInput');
  const paletteCount = document.getElementById('paletteCount');
  const layoutMode = document.getElementById('layoutMode');
  const intensityMode = document.getElementById('intensityMode');
  const aspectMode = document.getElementById('aspectMode');
  const bleedMode = document.getElementById('bleedMode');
  const variationMode = document.getElementById('variationMode');
  const runBtn = document.getElementById('runBtn');
  const rerollBtn = document.getElementById('rerollBtn');
  const demoBtn = document.getElementById('demoBtn');
  const statusEl = document.getElementById('status');
  const previewImg = document.getElementById('previewImg');
  const previewPlaceholder = document.getElementById('previewPlaceholder');
  const swatches = document.getElementById('swatches');
  const promptOutput = document.getElementById('promptOutput');
  const negativeOutput = document.getElementById('negativeOutput');
  const copyPromptBtn = document.getElementById('copyPromptBtn');
  const copyNegativeBtn = document.getElementById('copyNegativeBtn');

  negativeOutput.value = NEG;

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', {willReadFrequently:true});

  let currentPalette = null;
  let currentImageSrc = '';

  function setStatus(text, kind){
    statusEl.textContent = text;
    statusEl.className = 'status ' + (kind || 'warn');
  }

  function rgbToHex(r,g,b){
    return '#' + [r,g,b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('').toUpperCase();
  }

  function rgbToHsl(r,g,b){
    r/=255; g/=255; b/=255;
    const max=Math.max(r,g,b), min=Math.min(r,g,b);
    let h=0, s=0;
    const l=(max+min)/2;
    if(max!==min){
      const d=max-min;
      s=l>0.5 ? d/(2-max-min) : d/(max+min);
      switch(max){
        case r: h=(g-b)/d + (g<b?6:0); break;
        case g: h=(b-r)/d + 2; break;
        default: h=(r-g)/d + 4; break;
      }
      h/=6;
    }
    return {h:h*360, s:s*100, l:l*100};
  }

  function describeColor(r,g,b){
    const hsl = rgbToHsl(r,g,b);
    const h=hsl.h, s=hsl.s, l=hsl.l;
    if (s < 8 && l > 92) return '유백색';
    if (s < 10 && l < 18) return '먹빛 차콜';
    if (s < 12) return l > 65 ? '옅은 회색' : '차분한 회색';

    let base = '색';
    if (h < 15 || h >= 345) base = s > 55 ? '레드' : '로즈 레드';
    else if (h < 40) base = s < 45 ? '황토색' : '오렌지';
    else if (h < 65) base = '옐로';
    else if (h < 95) base = '황록색';
    else if (h < 150) base = l > 72 ? '민트 그린' : '그린';
    else if (h < 190) base = s < 35 ? '청록 회색' : '청록색';
    else if (h < 220) base = l > 72 ? '아쿠아 블루' : '하늘색';
    else if (h < 255) base = '블루';
    else if (h < 290) base = l > 72 ? '연보라' : '보라색';
    else if (h < 330) base = s > 55 ? '마젠타' : '핑크';
    else base = '로즈 핑크';

    let prefix = '';
    if (l > 80) prefix = '옅은 ';
    else if (l < 28) prefix = '짙은 ';
    else if (s < 28) prefix = '탁한 ';
    else if (s > 70) prefix = '선명한 ';
    else prefix = '부드러운 ';

    return (prefix + base).trim();
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1; i>0; i--){
      const j = Math.floor(Math.random() * (i+1));
      const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function pick(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function pickMany(arr, count){
    return shuffle(arr).slice(0, Math.min(count, arr.length));
  }

  function renderSwatches(palette){
    swatches.innerHTML = '';
    palette.forEach(function(c){
      const div = document.createElement('div');
      div.className = 'swatch';
      div.innerHTML = '<div class="color" style="background:'+c.hex+'"></div>'
        + '<div class="meta"><strong>'+c.role+'</strong><div>'+c.label+'</div><div>'+c.hex+'</div><div>'+c.ratio+'%</div></div>';
      swatches.appendChild(div);
    });
  }

  function extractPalette(img, count){
    const maxSide = 140;
    const scale = Math.min(maxSide / img.naturalWidth, maxSide / img.naturalHeight, 1);
    canvas.width = Math.max(1, Math.round(img.naturalWidth * scale));
    canvas.height = Math.max(1, Math.round(img.naturalHeight * scale));
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
    const buckets = {};
    const step = 20;

    for(let i=0; i<data.length; i+=step){
      const r=data[i], g=data[i+1], b=data[i+2], a=data[i+3];
      if(a<200) continue;
      const hsl = rgbToHsl(r,g,b);
      if(hsl.l > 98 && hsl.s < 5) continue;

      const key = [
        Math.floor(hsl.h / 24),
        Math.floor(hsl.s / 18),
        Math.floor(hsl.l / 18)
      ].join('_');

      if(!buckets[key]) buckets[key] = {r:0,g:0,b:0,count:0,s:0,l:0};
      buckets[key].r += r;
      buckets[key].g += g;
      buckets[key].b += b;
      buckets[key].s += hsl.s;
      buckets[key].l += hsl.l;
      buckets[key].count += 1;
    }

    let arr = Object.keys(buckets).map(key => {
      const x = buckets[key];
      return {
        r: Math.round(x.r / x.count),
        g: Math.round(x.g / x.count),
        b: Math.round(x.b / x.count),
        s: x.s / x.count,
        l: x.l / x.count,
        count: x.count
      };
    }).sort((a,b) => b.count - a.count);

    arr = arr.filter(c => !(c.l > 95 && c.s < 8));

    const chosen = [];
    for(let i=0; i<arr.length; i++){
      const c = arr[i];
      let ok = true;
      for(let j=0; j<chosen.length; j++){
        const d = Math.sqrt(
          Math.pow(c.r - chosen[j].r, 2) +
          Math.pow(c.g - chosen[j].g, 2) +
          Math.pow(c.b - chosen[j].b, 2)
        );
        if(d < 34){ ok = false; break; }
      }
      if(ok) chosen.push(c);
      if(chosen.length >= count) break;
    }
    while(chosen.length < count && chosen.length < arr.length){
      chosen.push(arr[chosen.length]);
    }

    const total = chosen.reduce((sum,c)=>sum+c.count,0) || 1;
    return chosen.map((c, idx) => ({
      role: idx === 0 ? '주조색' : idx === 1 ? '보조색' : '강조색',
      label: describeColor(c.r,c.g,c.b),
      hex: rgbToHex(c.r,c.g,c.b),
      ratio: Math.round(c.count / total * 100)
    }));
  }

  function loadImage(file){
    return new Promise(function(resolve, reject){
      const reader = new FileReader();
      reader.onload = function(e){
        const img = new Image();
        img.onload = function(){ resolve(img); };
        img.onerror = function(){ reject(new Error('이미지를 열지 못했다.')); };
        img.src = e.target.result;
      };
      reader.onerror = function(){ reject(new Error('파일을 읽지 못했다.')); };
      reader.readAsDataURL(file);
    });
  }

  function buildBleedSentence(mode, variation){
    const banks = {
      '안개형 워시': [
        '물이 넓게 번진 안개형 워시를 중심으로 가장자리 경계를 거의 지우듯 흐리게 만든다.',
        '옅은 수분층 위에 안료가 미세하게 퍼지는 안개형 번짐을 크게 잡고, 중심부는 매우 부드럽게 비워 둔다.',
        '젖은 종이 위에서 안료가 구름처럼 풀어지는 안개형 확산을 주요 효과로 사용한다.'
      ],
      '블룸 강조': [
        '물자국이 마르며 생기는 블룸을 여러 곳에 남기고, 농담 차이가 있는 꽃잎형 번짐 자국을 살린다.',
        '가장자리 블룸과 둥근 수채화 꽃번짐을 의도적으로 강조해 우연한 물무늬를 만든다.',
        '번짐 경계마다 연한 블룸 자국이 피어오르듯 남게 하고, 작은 안료 고임을 군데군데 배치한다.'
      ],
      '역번짐 강조': [
        '건조 중 밀려난 안료 경계와 역번짐을 분명히 남겨 수채화 특유의 불규칙한 테두리를 만든다.',
        '마르는 속도의 차이로 생기는 backrun과 역번짐 흔적을 화면 곳곳에 섞는다.',
        '얇은 워시 위에 물이 다시 스며들며 생기는 역번짐을 예측 불가하게 배치한다.'
      ],
      '가장자리 풀링': [
        '안료가 가장자리에 모여 진해지는 풀링 효과를 살리고, 내부는 상대적으로 투명하게 남긴다.',
        '색면 외곽에 안료가 얇게 둘러앉는 가장자리 고임을 강조해 종이 결이 더 드러나게 한다.',
        '워시 가장자리에서 안료가 눌어붙듯 짙어지는 풀링 흔적을 주요 질감으로 사용한다.'
      ],
      '다층 워시': [
        '옅은 워시 위에 또 다른 반투명 워시를 겹쳐 깊이감 있는 다층 번짐을 만든다.',
        '투명한 색층이 두세 겹씩 포개지며 아래층이 은근히 비치도록 다층 워시를 구성한다.',
        '얇은 층과 중간 농도의 층이 시간차를 두고 겹쳐지는 다층 수채화 질감을 만든다.'
      ],
      '입자 확산': [
        '안료 입자가 종이 결에 걸리듯 퍼지는 그레뉼레이션과 미세한 입자 확산을 살린다.',
        '고운 입자감과 엷은 스펙클이 번짐 내부에 남아 종이 표면의 거칠기를 드러내게 한다.',
        '부드러운 워시 속에서도 안료 입자가 미세하게 분리되는 입자 확산을 섞는다.'
      ],
      '비대칭 대형 번짐': [
        '큰 번짐 덩어리를 화면 한쪽에 치우치게 두고, 작은 번짐과 여백을 비대칭으로 배치한다.',
        '한쪽 모서리에서 크게 터진 물 번짐과 반대편의 얇은 여백이 불균형하게 공존하도록 만든다.',
        '대형 색면 하나와 잔잔한 보조 번짐 몇 개가 비대칭 구조를 이루게 한다.'
      ]
    };

    const autoModes = Object.keys(banks);
    let selectedModes = [];
    if (mode === '자동 랜덤') {
      const pickCount = variation === '강함' ? 3 : 2;
      selectedModes = pickMany(autoModes, pickCount);
    } else {
      selectedModes = [mode];
      if (variation !== '안정적') {
        const otherModes = autoModes.filter(x => x !== mode);
        selectedModes = selectedModes.concat(pickMany(otherModes, variation === '강함' ? 2 : 1));
      }
    }

    const sentences = [];
    selectedModes.forEach(function(m){
      sentences.push(pick(banks[m]));
    });

    const control = {
      '안정적': '번짐의 종류는 많지 않게 유지하되, 선택한 효과가 화면 전체의 인상을 지배하도록 정돈한다.',
      '중간': '번짐의 크기와 방향을 조금씩 달리해 반복감을 줄이고, 동일한 패턴이 복제된 것처럼 보이지 않게 한다.',
      '강함': '번짐의 방향, 크기, 밀도를 일부러 불균형하게 섞고, 우연적 물흐름이 만든 비정형 흔적을 더 강하게 남긴다.'
    }[variation];

    return sentences.join(' ') + ' ' + control;
  }

  function buildLayoutSentence(layout){
    const banks = {
      '중앙 여백형': [
        '중앙 25~35%는 비교적 밝고 부드러운 여백으로 남기고, 가장자리에서 안쪽으로 안료가 천천히 스며들게 한다.',
        '텍스트가 올라갈 수 있도록 중앙부를 한층 옅게 비워 두고 바깥쪽에서 안쪽으로 번짐을 모은다.'
      ],
      '가장자리 확산형': [
        '가장자리에 안료가 더 많이 머물고 중앙으로 갈수록 옅어지는 확산형 구도로 만든다.',
        '외곽의 농도는 더 높이고 내부로 들어오며 천천히 희석되는 가장자리 확산 구조를 쓴다.'
      ],
      '대각선 흐름형': [
        '한쪽 모서리에서 반대편으로 이어지는 대각선 흐름과 긴 워시 자국을 만든다.',
        '대각선 방향으로 큰 색면이 기울어지며 흘러가고, 중간마다 작은 번짐층이 걸쳐지게 한다.'
      ],
      '전면 워시형': [
        '화면 전체에 넓은 워시를 깔고, 일부 구역만 농담을 달리해 단조로움을 깨뜨린다.',
        '전면 워시를 기본으로 하되 몇 군데만 농도와 수분량을 달리해 자연스러운 리듬을 만든다.'
      ]
    };
    return pick(banks[layout] || banks['중앙 여백형']);
  }

  function buildIntensitySentence(mode){
    const banks = {
      '연하고 공기감 있게': [
        '전체 채도와 명도를 부드럽게 유지하고, 맑고 옅은 레이어 중심의 공기감을 살린다.',
        '연한 워시와 넓은 여백을 우선해 숨이 트이는 듯한 밝은 수채화 인상을 만든다.'
      ],
      '균형감 있게': [
        '옅은 워시와 중간 농도의 안료층을 균형 있게 섞어 안정된 수채화 분위기를 만든다.',
        '밝은 부분과 중간 농도의 부분을 균형 있게 배치해 과하게 비거나 과하게 꽉 차지 않게 한다.'
      ],
      '대비감 있게': [
        '밝은 여백과 짙은 안료층의 대비를 분명히 두되, 경계는 여전히 자연스럽게 번지게 한다.',
        '투명한 구역과 짙게 고인 구역을 함께 두어 시선이 멈추는 대비를 만든다.'
      ]
    };
    return pick(banks[mode] || banks['균형감 있게']);
  }

  function buildColorSentence(palette){
    const dominant = palette[0];
    const secondary = palette[1];
    const accents = palette.slice(2);
    const sentences = [];

    const introOptions = [
      '업로드 이미지에서 추출한 핵심 팔레트는 ' + palette.map(c => c.label + '(' + c.hex + ')').join(', ') + '이다.',
      '사진에서 읽어낸 핵심 색상은 ' + palette.map(c => c.label + '(' + c.hex + ')').join(', ') + '이며, 이를 추상 수채화로 재해석한다.'
    ];
    sentences.push(pick(introOptions));

    if (dominant) {
      sentences.push(pick([
        '주조색은 ' + dominant.label + '(' + dominant.hex + ')으로 가장 넓은 워시와 화면의 기본 분위기를 형성한다.',
        dominant.label + '(' + dominant.hex + ')을 가장 큰 색면에 배치해 전체 온도와 무드를 결정한다.'
      ]));
    }

    if (secondary) {
      sentences.push(pick([
        '보조색은 ' + secondary.label + '(' + secondary.hex + ')으로 반투명한 레이어를 겹치고 주조색과 부드럽게 섞이게 한다.',
        secondary.label + '(' + secondary.hex + ')은 주조색 옆에서 천천히 번지며 중간 농도의 층을 만든다.'
      ]));
    }

    if (accents.length) {
      const accentText = accents.map(c => c.label + '(' + c.hex + ')').join(', ');
      sentences.push(pick([
        '강조색은 ' + accentText + '을 작은 안료 포인트, 블룸 주변, 가장자리 농도 심화에 제한적으로 사용한다.',
        accentText + '은 화면 전체를 지배하지 않도록 소량만 쓰고, 포인트 번짐이나 경계 농축에만 활용한다.'
      ]));
    } else {
      sentences.push('강조색은 최소화하고 두세 색 사이의 자연스러운 물 번짐을 중심으로 구성한다.');
    }

    return sentences.join(' ');
  }

  function buildBaseSentence(aspect){
    const intros = [
      aspect + ' 비율의 인스타그램 배경용 추상 수채화 이미지.',
      '인스타그램 배경으로 쓰기 좋은 ' + aspect + ' 비율의 비구상 수채화 배경.',
      aspect + ' 화면을 채우는 추상 수채화 아트 배경.'
    ];
    const bodies = [
      '차가운 압착 수채화지 위에 그린 고해상도 추상 수채화 배경, 탑뷰 스캔 이미지, wet-on-wet 기법, 자연스럽게 번지는 안료, 종이 결과 안료 입자감이 선명하게 보이는 표현.',
      '냉압 수채화지 표면, 탑뷰 스캔 질감, 젖은 종이 위로 안료가 퍼지는 wet-on-wet 중심 표현, 반투명한 수채 레이어와 종이의 거친 결을 함께 드러낸다.',
      '차가운 압착 종이의 조직감이 보이는 스캔형 수채화 텍스처, 물과 안료가 겹치며 생기는 반투명 레이어, 자연스러운 가장자리 번짐과 미세한 색 입자 표현.'
    ];
    const endings = [
      '사물이나 인물 없이 오직 색, 물, 안료, 종이, 흐름, 번짐만으로 구성된 비구상 이미지.',
      '현대적인 아트 프린트 감성의 미니멀 배경으로, 구체적 사물 묘사 없이 색과 물성만 남긴다.',
      '형태 재현보다 물성과 색감의 흐름을 우선하는 세련된 추상 배경.'
    ];
    return pick(intros) + ' ' + pick(bodies) + ' ' + pick(endings);
  }

  function buildAntiRepetitionSentence(variation){
    const common = [
      '원본 사진의 사물, 윤곽, 형태, 실루엣, 구도는 재현하지 말고 핵심 색감과 분위기만 추출한다.',
      '특정 대상의 외형을 복사하지 말고, 색의 인상과 분위기만 남긴 채 추상 수채화 배경으로 번역한다.'
    ];
    const variants = {
      '안정적': [
        '형태는 단정하게 유지하되, 동일한 워시 패턴이 기계적으로 반복되지 않게 한다.',
        '전체 질서는 유지하되, 경계와 번짐은 손으로 그린 수채화처럼 조금씩 불규칙하게 둔다.'
      ],
      '중간': [
        '색면의 크기와 번짐의 방향을 조금씩 어긋나게 두어 템플릿처럼 보이지 않게 한다.',
        '같은 형태가 반복된 것처럼 보이지 않도록 번짐의 간격과 농담을 자연스럽게 흔든다.'
      ],
      '강함': [
        '매번 생성될 때마다 번짐의 밀도, 길이, 경계 형태가 달라지도록 우연성을 높이고, 지나치게 정돈된 대칭 구조는 피한다.',
        '비슷한 결과가 반복되지 않도록 물의 흐름, 경계의 찢김, 안료 고임의 위치를 비정형적으로 재배치한다.'
      ]
    };
    return pick(common) + ' ' + pick(variants[variation] || variants['중간']);
  }

  function makePrompt(palette){
    const parts = [
      buildBaseSentence(aspectMode.value),
      buildColorSentence(palette),
      buildLayoutSentence(layoutMode.value),
      buildIntensitySentence(intensityMode.value),
      buildBleedSentence(bleedMode.value, variationMode.value),
      buildAntiRepetitionSentence(variationMode.value)
    ];
    return parts.join(' ');
  }

  async function run(){
    const file = imageInput.files && imageInput.files[0];
    if(!file){
      setStatus('먼저 이미지를 업로드해야 한다.', 'err');
      return;
    }

    runBtn.disabled = true;
    runBtn.textContent = '분석 중...';
    setStatus('이미지를 읽고 색상을 분석하는 중이다...', 'warn');

    try{
      const img = await loadImage(file);
      currentImageSrc = img.src;
      previewImg.src = img.src;
      previewImg.style.display = 'block';
      previewPlaceholder.style.display = 'none';

      const count = Number(paletteCount.value || 3);
      currentPalette = extractPalette(img, count);
      renderSwatches(currentPalette);

      const prompt = makePrompt(currentPalette);
      promptOutput.value = prompt;
      negativeOutput.value = NEG;

      setStatus('완료됐다. 이제 같은 팔레트로 다시 변주하기를 눌러 다른 번짐 결과용 프롬프트를 뽑을 수 있다.', 'ok');
    }catch(err){
      console.error(err);
      setStatus('오류: ' + (err && err.message ? err.message : '알 수 없는 오류'), 'err');
    }finally{
      runBtn.disabled = false;
      runBtn.textContent = '색상 추출하고 프롬프트 만들기';
    }
  }

  function reroll(){
    if(!currentPalette){
      setStatus('먼저 이미지를 분석하거나 샘플 데이터를 불러와야 한다.', 'err');
      return;
    }
    promptOutput.value = makePrompt(currentPalette);
    negativeOutput.value = NEG;
    setStatus('같은 팔레트로 프롬프트를 다시 변주했다.', 'ok');
  }

  function demo(){
    currentPalette = [
      {role:'주조색', label:'부드러운 민트 그린', hex:'#BFD7CA', ratio:40},
      {role:'보조색', label:'탁한 황토색', hex:'#B28D6E', ratio:32},
      {role:'강조색', label:'먹빛 차콜', hex:'#2B2A2E', ratio:16},
      {role:'강조색', label:'부드러운 로즈 핑크', hex:'#C98FA4', ratio:12}
    ];
    renderSwatches(currentPalette);
    previewImg.style.display = 'none';
    previewPlaceholder.style.display = 'block';
    previewPlaceholder.textContent = '샘플 데이터 상태다. 업로드 없이 프롬프트 구조를 테스트할 수 있다.';
    promptOutput.value = makePrompt(currentPalette);
    negativeOutput.value = NEG;
    setStatus('샘플 데이터로 테스트했다. 번짐 스타일과 변주 강도를 바꾼 뒤 다시 변주하기를 눌러 차이를 확인하면 된다.', 'ok');
  }

  async function copyText(text, btn){
    try{
      if(navigator.clipboard && window.isSecureContext){
        await navigator.clipboard.writeText(text);
      }else{
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      const old = btn.textContent;
      btn.textContent = '복사됨';
      setTimeout(function(){ btn.textContent = old; }, 1200);
    }catch(e){
      setStatus('복사는 Safari 보안 정책 때문에 실패할 수 있다. 텍스트를 길게 눌러 직접 복사하면 된다.', 'warn');
    }
  }

  runBtn.addEventListener('click', run);
  rerollBtn.addEventListener('click', reroll);
  demoBtn.addEventListener('click', demo);
  copyPromptBtn.addEventListener('click', function(){ copyText(promptOutput.value, copyPromptBtn); });
  copyNegativeBtn.addEventListener('click', function(){ copyText(negativeOutput.value, copyNegativeBtn); });

  window.addEventListener('error', function(e){
    setStatus('오류: ' + (e.message || '알 수 없는 오류'), 'err');
  });

  setStatus('준비됨. JSON 출력은 제거했고, 번짐 스타일과 변주 강도를 추가했다.', 'warn');
})();
</script>
